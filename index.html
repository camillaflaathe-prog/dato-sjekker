<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f3f3f3;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            font-size: 1.6rem;
            max-width: 400px;
        }
        .small {
            font-size: 1.1rem;
            color: #555;
            margin-top: 12px;
        }

        /* --- Animasjon for "..." --- */
        .dots span {
            animation: blink 1.4s infinite both;
            font-weight: bold;
        }
        .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
    </style>
</head>
<body>
    <div class="box" id="message">Loading...</div>

    <script>
        function checkDate() {
            const today = new Date();
            const target = new Date(today.getFullYear(), 5, 24); // June 24

            const msgBox = document.getElementById("message");

            if (today.toDateString() === target.toDateString()) {
                msgBox.innerHTML = "Finally the day!";
            } 
            else if (today < target) {
                const diffTime = target - today;
                const daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                msgBox.innerHTML = `
                    Still counting<span class="dots"><span>.</span><span>.</span><span>.</span></span>
                    <div class="small">${daysLeft} days left</div>
                `;
            } 
            else {
                msgBox.innerHTML = "Ready set go";
            }
        }

        checkDate();
    </script>
</body>
</html>
